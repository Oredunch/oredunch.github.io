name: Update Latest YouTube Video

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}


jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: actions-json
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Fetch latest video
        run: |
          node fetch-latest.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout actions-json

          git add latest-video.json
          git commit -m "Update latest video" || exit 0

          git push origin actions-json

