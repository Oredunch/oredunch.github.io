<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Sammy Oredunchinch</title>
  <meta name="description" content="Official page of Sammy Oredunchinch">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.oredunch.github.io/">

  <link rel="icon" type="image/png" sizes="32x32" href="/images/SamO.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/SamO.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&family=Doto:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <meta name="color-scheme" content="dark light">
</head>
	

<body>
	<div class="cover" id="cover"></div>

	<p id="error-message-tab" class="error-message"></p>

	<div id="clickspace" class="empty-clickspace"></div>

	<div id="video-animation" class="background-animation">
		<video id="video-resource" src="images/animation.webm" autoplay loop muted></video>
	</div>
	<div id="still-image" class="background-still">
		<img id="still-image-resource" src="images/still_image.png">
	</div>

	<div id="center-1" class="center">
		<div class="logo">
			<img id="logo-image" src="images/SamO.png" alt="Logo" class="logo">
		</div>

		<div class="separator"></div>

		<div class="center-right">
			<h1 class="break-anywhere" aria-label="Sammy Oredunchinch" id="name">__________________</h1>
			<a id="button" href="https://www.youtube.com/@SammyOredunchinch" aria-label="Button to Youtube channel" target="_blank" class="button">YouTube
				<img class="inline-emoji" src="images/Youtube-Cyan.png" alt="YouTube Icon">
			</a>
			<input type="checkbox" class="checkbox-1" name="pop out" id="info-toggle">
			<label id="pop-label" for="info-toggle" class="button">
				<span id="arrow" class="popout-indicator">
					<svg width="48" height="48" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<path d="M3 16 L12 7 L21 16" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round" />
					</svg>
				</span>
			</label>
		</div>
	</div>
	<div id="info-tab" class="center2">
		<h2 class="padding">Newest video</h2>
		<span class="youtube-span ab ax" id="latest-video"></span>
		<button id="close" class="button pad bl">
			<svg width="48" height="48" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
				<path d="M6 6 L18 18 M6 18 L18 6" fill="none" stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round" />
		</button>
	</div>

	<script src="main.js"></script>
</body>

</html>
