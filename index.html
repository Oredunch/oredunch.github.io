<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

	<style>
		body {
			visibility: hidden;
			background-color: #000000;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>

	<title>Sammy Oredunchinch</title>
	<meta name="description" content="Official page of Sammy Oredunchinch">
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "WebPage",
		"name": "Project",
		"keywords": [
		"music",
		"experimental music",
		"sound design",
		"art",
		"visual art",
		"multimedia",
		"performance"
		]
	}
	</script>
	<meta name="theme-color" content="#000000">
	<meta name="robots" content="index, follow">
	<link rel="canonical" href="https://www.oredunch.github.io/">

	<link rel="icon" type="image/png" sizes="32x32" href="/images/SamO.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/images/SamO.png">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link
		href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&family=Doto:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="styles.css">

	<meta name="color-scheme" content="dark light">
</head>


<body class="desktop">
	<div class="cover" id="cover"></div>

	<div class="page-wrapper">
		<p id="error-message-tab" class="error-message"></p>

		<div id="clickspace" class="empty-clickspace disabled"></div>

		<div id="video-animation" class="background-animation">
			<video id="video-resource" src="/images/animation.webm" autoplay loop muted></video>
		</div>
		<div id="still-image" class="background-still">
			<img id="still-image-resource" src="/images/still_image.png">
		</div>

		<div data-cursor="pointer" id="mouseToggle">
			<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
				<path
					d="M7.92098 2.29951C6.93571 1.5331 5.5 2.23523 5.5 3.48349V20.4923C5.5 21.9145 7.2945 22.5382 8.17661 21.4226L12.3676 16.1224C12.6806 15.7267 13.1574 15.4958 13.6619 15.4958H20.5143C21.9425 15.4958 22.5626 13.6887 21.4353 12.8119L7.92098 2.29951Z" />
			</svg>
		</div>

		<nav id="nav-menu" class="nav-bar">
			<div class="nav-title-bar">
				<h2>Menu</h2>
				<button id="close-menu-button" class="simple-cross right"></button>

			</div>
			<ul>
				<li data-cursor="pointer">
					<p class="link">Coming soon</p>
				</li>
				<li data-cursor="pointer" class="flop">
					<p class="link">Coming soon</p>
				</li>
				<li data-cursor="pointer">
					<p class="link">Coming soon</p>
				</li>
				<li data-cursor="pointer" class="flop">
					<p class="link">Coming soon</p>
				</li>
				<li data-cursor="pointer" class="github"><a class="code"
						href="https://github.com/Oredunch/oredunch.github.io">Source Code</a>
				</li>
			</ul>
		</nav>

		<button id="open-menu-button" class="simple-cross alt"></button>

		<div id="center-1" class="center">
			<div data-cursor="pointer" class="logo">
				<img id="logo-image" src="images/SamO.png" alt="Logo" class="logo">
			</div>

			<div class="separator"></div>

			<div class="center-right">
				<h1 data-cursor="pointer" aria-label="Sammy Oredunchinch" id="name"></h1>
				<div class="buttons">
					<div class="flexible-space"></div>
					<a data-cursor="pointer" id="button" href="https://www.youtube.com/@SammyOredunchinch"
						aria-label="Button to Youtube channel" target="_blank" class="button">YouTube
						<img class="inline-emoji" src="images/Youtube-Cyan.png" alt="YouTube Icon">
					</a>
					<input type="checkbox" class="checkbox-1" name="pop out" id="info-toggle">
					<label data-cursor="pointer" id="pop-label" for="info-toggle" class="button">
						<span id="arrow" class="popout-indicator">
							<svg width="48" height="48" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
								<path d="M3 16 L12 7 L21 16" fill="none" stroke="currentColor" stroke-width="2"
									stroke-linecap="round" stroke-linejoin="round" />
							</svg>
						</span>
					</label>
				</div>
			</div>
		</div>
		<div id="info-tab" class="center2">
			<h2 class="padding">Newest video</h2>
			<span class="youtube-span ax" id="latest-video"></span>
			<button data-cursor="pointer" id="close" class="button pad">
				<svg width="48" height="48" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
					<path d="M6 6 L18 18 M6 18 L18 6" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round" />
			</button>
		</div>
	</div>

	<div id="cursor" class="cursor-overlay visible"></div>

	<script type="module" src="/js/main.js"></script>
	<script type="module" src="/js/mouse.js"></script>
</body>

</html>
